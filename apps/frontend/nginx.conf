server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: 未知のパスは index.html にフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api は backend サービスへプロキシ。
    # backend を変数経由で参照し、Docker の組み込み DNS(127.0.0.11) で
    # リクエストごとに解決する。これにより backend を再ビルドして IP が
    # 変わっても nginx が古い IP をキャッシュし続ける問題を避ける。
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream backend;
        proxy_pass http://$upstream:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE（ストリーミング）対応: バッファリング無効化・長め read timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
    }
}
